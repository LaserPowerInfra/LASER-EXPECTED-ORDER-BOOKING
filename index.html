<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QC TESTING_KGP CONDUCTOR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
/* Basic Reset */
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;height:100%;font-family:Segoe UI,Arial,sans-serif;}
#bgVideo{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:-1}

header{background:#0d6efd;color:#fff;padding:10px;text-align:center;font-size:20px;font-weight:600;position:sticky;top:0;z-index:1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2);}

/* --- CARD STYLE (Glassmorphism) --- */
.card{
    max-width: 1100px;
    width: 96%;
    margin: 15px auto; 
    
    /* Transparent White Background */
    background: rgba(255, 255, 255, 0.85); 
    
    /* Glass Effect */
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    
    padding: 20px; 
    border-radius:10px; 
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); 
    border: 1px solid rgba(255, 255, 255, 0.18);
}

#loginSection{text-align:center;padding:50px 20px}
.btn-google{background:#fff;color:#444;border:1px solid #ddd;padding:12px 25px;border-radius:50px;font-weight:600;cursor:pointer}

#formSection{display:none}
.user-info{
    background: rgba(231, 241, 255, 0.9); 
    color:#0d6efd;
    padding:8px;
    border-radius:6px;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold; 
    font-size: 14px;
}

/* 2 Column Grid */
.form-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 20px;
    row-gap: 10px; 
}

label{
    font-size:11px;
    font-weight:700; 
    margin-bottom: 2px; 
    display: block; 
    color: #333; 
}
.req::after{content:" *";color:red}

/* COMPACT INPUTS & SELECTS */
input, select {
    width:100%;
    padding: 6px 8px;
    border:1px solid #aaa; 
    border-radius:4px;
    font-size: 12px;
    height: 32px;
    color: #000;
    background: rgba(255, 255, 255, 0.95); 
    transition: all 0.2s;
}
input:focus, select:focus { border-color: #0d6efd; outline: none; background: #fff; box-shadow: 0 0 5px rgba(13, 110, 253, 0.3); }

/* --- UPDATED STYLE FOR READONLY (FORMULATED) FIELDS --- */
input[readonly] {
    background-color: #fffde7; 
    color: #000000;            
    font-weight: 800;          
    border: 1px solid #fbc02d; 
    cursor: default;
    opacity: 1;                
    font-size: 13px;           
}

select option { font-size: 12px; padding: 4px; }

/* Custom Searchable Dropdown Style */
.combo { position: relative; }
.combo::after {
    content: ''; position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 5px solid #666;
    pointer-events: none;
}
.combo input { padding-right: 30px; cursor: pointer; }

/* Compact List for Searchable Dropdown */
.combo-list {
    position:absolute; top:100%; left:0; right:0; background:#fff;
    border:1px solid #ccc; max-height:180px; overflow-y:auto; display:none;
    z-index:1000; box-shadow: 0 4px 6px rgba(0,0,0,0.2); border-radius: 0 0 4px 4px;
}
.combo-list div{
    padding: 6px 10px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    font-size: 12px;
    line-height: 1.3;
}
.combo-list div:hover{background:#e9ecef}

/* BUTTONS */
.btn-group {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 20px;
}

button.submit-btn {
    padding: 12px;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
    transition: background 0.2s;
}

.btn-exit { background: #546e7a; }
.btn-exit:hover { background: #455a64; }

.btn-keep { background: #0d6efd; }
.btn-keep:hover { background: #0b5ed7; }

.logout-container { text-align: center; margin-top: 10px; }
.logout-btn{border:1px solid #dc3545;color:#dc3545;padding:5px 15px;border-radius:4px;background:rgba(255,255,255,0.9);cursor:pointer; font-size: 12px; font-weight: bold;}
.logout-btn:hover { background: #dc3545; color: white; }

/* Mobile Responsive */
@media(max-width:700px){
    .form-grid{grid-template-columns:1fr}
    .btn-group { grid-template-columns: 1fr; gap: 10px; } 
}
</style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline>
  <source src="https://laserpowerinfra.com/wp-content/uploads/2025/09/lpi-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<header>QC TESTING_KGP CONDUCTOR</header>

<div class="card">

<div id="loginSection">
  <h3>Welcome User</h3>
  <button onclick="googleLogin()" class="btn-google">Sign in with Google</button>
</div>

<div id="formSection">
  <div class="user-info" id="userInfoDisplay"></div>

  <form class="form-grid" id="entryForm">
    <input type="hidden" id="userEmail" name="userEmail">
    <input type="hidden" id="testedBy" name="testedBy">

    <div><label class="req">Date</label><input type="date" id="entryDate" name="entryDate" required></div>
    <div><label class="req">Shift</label><select name="shift" required><option value="">Select</option><option>DAY</option><option>NIGHT</option></select></div>
    
    <div><label class="req">MACHINE NO</label><select name="machineNo" required><option value="">Select</option><option>RBD-14</option><option>RBD-17</option><option>RBD-18</option><option>RBD-19</option></select></div>
    
    <div class="combo" id="comboWrapper">
        <label class="req">QUOTATION NO</label>
        <input id="quotationInput" name="quotation_no" placeholder="Select or type quotation..." autocomplete="off" required>
        <div id="quotationList" class="combo-list"></div>
    </div>

    <div><label class="req">SL NO (Auto)</label><input type="text" id="slnoInput" name="slno" readonly required></div>
    <div><label class="req">GRID ID (Auto)</label><input type="text" id="gridIdInput" name="grid_id" readonly required></div>

    <div><label class="req">M/C NO</label><input name="mcNo" required></div>
    <div><label class="req">Customer Name</label><input name="customerName" required></div>
    
    <div><label class="req">Cable Type / Size</label><input name="cableType" required></div>
    <div><label class="req">BOBBIN / DRUM NO</label><input type="text" name="drumNo" required></div>
    
    <div><label class="req">Process</label><select name="process" required><option value="">Select</option><option>AFTER AGEING</option><option>BEFORE AGEING</option></select></div>
    
    <div><label class="req">OD/DIA</label><input type="number" step="any" id="odDia" name="odDia" required></div>
    <div><label class="req">CR@20 DEG C</label><input type="number" step="any" id="cr20" name="cr20" required></div>
    <div><label class="req">BREAKING LOAD</label><input type="number" step="any" id="breakingLoad" name="breakingLoad" required></div>
    
    <div><label class="req">ELONGATION BREAK LOAD</label>
      <input type="number" step="any" id="elongationBreakLoad" name="elongationBreakLoad" required>
    </div>
    
    <div><label class="req">ELONGATION % (Auto)</label>
      <input type="number" step="any" id="elongation" name="elongation" readonly required>
    </div>
    
    <div><label class="req">UTS (Auto)</label><input type="number" step="any" id="uts" name="uts" readonly required></div>
    <div><label class="req">CONDUCTIVITY (Auto)</label><input type="number" step="any" id="conductivity" name="conductivity" readonly required></div>
    <div><label class="req">WEIGHT (Auto)</label><input type="number" step="any" id="weight" name="weight" readonly required></div>
    <div><label class="req">RESITIVITY (Auto)</label><input type="number" step="any" id="resistivity" name="resistivity" readonly required></div>

    <div><label>TORSION</label><input type="text" name="torsion"></div>
    <div><label class="req">Results</label><select name="results" required><option value="">Select</option><option>FAIL</option><option>PASS</option><option>OK</option></select></div>
    
    <div><label class="req">REMARKS</label><select name="remarks" required><option value="">Select</option><option>BL FAIL</option><option>UTS FAIL</option><option>PASS</option><option>OK</option></select></div>
    
    <div><label>Akshat Sir Approval</label><select name="akshat_sir_approval"><option value="">Select</option><option>Approved</option><option>Pending</option></select></div>

    <div class="btn-group">
        <button type="button" class="submit-btn btn-exit" id="btnSubmitExit" onclick="handleFormSubmit(true)">Submit & Exit</button>
        <button type="button" class="submit-btn btn-keep" id="btnSubmitKeep" onclick="handleFormSubmit(false)">Submit & Keep Data</button>
    </div>

  </form>

  <div class="logout-container">
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyDywbG-rcyBHFB6OhuJesqasadBYDRlrJk",
  authDomain:"laser-html-apps.firebaseapp.com",
  projectId:"laser-html-apps",
  appId:"1:919012116249:web:3699a77a34c8c8facd6788"
};

// ** REPLACE WITH YOUR DEPLOYED URL **
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwJPfqKIsYl_uFwuGxXQsz-bHlFTKLM1jY_c7CYGA64zmmJqIQk4ZDVM8BYajfwzAJudQ/exec";

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

const loginSection=document.getElementById("loginSection");
const formSection=document.getElementById("formSection");
const userInfoDisplay=document.getElementById("userInfoDisplay");

const quotationInput = document.getElementById("quotationInput");
const slnoInput = document.getElementById("slnoInput");
const gridIdInput = document.getElementById("gridIdInput");
const quotationList = document.getElementById("quotationList");
const comboWrapper = document.getElementById("comboWrapper");

let quotationData = [];
let lastSubmittedJSON = "";

document.addEventListener("DOMContentLoaded", () => {
  const dateInput = document.getElementById("entryDate");
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  dateInput.value = `${yyyy}-${mm}-${dd}`;
});

const odInput = document.getElementById("odDia");
const crInput = document.getElementById("cr20");
const blInput = document.getElementById("breakingLoad");
const elBreakInput = document.getElementById("elongationBreakLoad");

const utsInput = document.getElementById("uts");
const weightInput = document.getElementById("weight");
const resInput = document.getElementById("resistivity");
const condInput = document.getElementById("conductivity");
const elInput = document.getElementById("elongation");

function calculateAll() {
    const od = parseFloat(odInput.value) || 0;
    const cr = parseFloat(crInput.value) || 0;
    const bl = parseFloat(blInput.value) || 0;
    const elBreak = parseFloat(elBreakInput.value) || 0;

    if (od > 0) {
        weightInput.value = ((3.14 / 4) * od * od * 2.703).toFixed(2);
    } else {
        weightInput.value = "";
    }

    let resistivityVal = 0;
    if (od > 0 && cr > 0) {
        resistivityVal = (3.14 / 4) * od * od * cr;
        resInput.value = resistivityVal.toFixed(4);
    } else {
        resInput.value = "";
    }

    if (resistivityVal > 0) {
        condInput.value = ((1 / resistivityVal) * 1724.1).toFixed(2);
    } else {
        condInput.value = "";
    }

    if (od > 0 && bl > 0) {
        const area = (od * od * 3.142) / 4;
        utsInput.value = ((bl / area) / 9.8 * 1000).toFixed(2);
    } else {
        utsInput.value = "";
    }

    if (elBreak > 0) {
        const elongationPercent = ((elBreak - 250) / 250) * 100;
        elInput.value = elongationPercent.toFixed(2);
    } else {
        elInput.value = "";
    }
}

odInput.addEventListener("input", calculateAll);
crInput.addEventListener("input", calculateAll);
blInput.addEventListener("input", calculateAll);
elBreakInput.addEventListener("input", calculateAll);

window.googleLogin=()=>signInWithPopup(auth,provider);
window.logout=()=>signOut(auth).then(()=>location.reload());

onAuthStateChanged(auth,user=>{
  if(user){
    loginSection.style.display="none";
    formSection.style.display="block";
    userInfoDisplay.textContent="👤 "+user.displayName;
    document.getElementById("userEmail").value=user.email;
    document.getElementById("testedBy").value=user.displayName;
    loadQuotationList();
  }
});

function loadQuotationList(){
  quotationInput.placeholder = "Loading quotation list...";

  fetch(SCRIPT_URL + "?action=getCoilList")
    .then(r => r.json())
    .then(res => {
      if (res.result !== "success" || !Array.isArray(res.data)) {
        throw new Error("Invalid response");
      }
      quotationData = res.data;
      quotationInput.placeholder = "Select or type quotation...";
    })
    .catch(err => {
      console.error(err);
      quotationInput.placeholder = "Error loading list";
      Swal.fire(
        "Server Error",
        "Unable to load QUOTATION list. Check network.",
        "error"
      );
    });
}

function showList(val = "") {
  quotationList.innerHTML = "";
  const fragment = document.createDocumentFragment();
  const valLower = val.toLowerCase();
  let count = 0; 

  for (let i = 0; i < quotationData.length; i++) {
     if (count >= 100) break;
     
     const qNo = String(quotationData[i].quotation_no || "");
     
     if (qNo.toLowerCase().includes(valLower)) {
        const d = document.createElement("div");
        d.textContent = qNo;
        d.onmousedown = () => { 
            // Auto fill inputs on selection
            quotationInput.value = qNo;
            slnoInput.value = quotationData[i].slno || "";
            gridIdInput.value = quotationData[i].grid_id || "";
            
            quotationList.style.display = "none";
        };
        fragment.appendChild(d);
        count++;
     }
  }
  if (count > 0) {
    quotationList.appendChild(fragment);
    quotationList.style.display = "block";
  } else {
    quotationList.style.display = "none";
  }
}

quotationInput.addEventListener("input", () => {
    showList(quotationInput.value);
    // Clear auto-fill fields if user changes input manually
    slnoInput.value = "";
    gridIdInput.value = "";
});
quotationInput.addEventListener("focus", () => showList(quotationInput.value));
quotationInput.addEventListener("click", () => showList(quotationInput.value));
quotationInput.addEventListener("keydown", (e) => { if (e.key === "Tab") quotationList.style.display = "none"; });
document.addEventListener("click", e => { if (!comboWrapper.contains(e.target)) quotationList.style.display = "none"; });
quotationInput.addEventListener("blur", () => { setTimeout(() => { quotationList.style.display = "none"; }, 200); });

const entryForm = document.getElementById("entryForm");
const btnSubmitExit = document.getElementById("btnSubmitExit");
const btnSubmitKeep = document.getElementById("btnSubmitKeep");

const Toast = Swal.mixin({
  toast: true,
  position: 'top-end',
  showConfirmButton: false,
  timer: 2000,
  timerProgressBar: true,
  didOpen: (toast) => {
    toast.addEventListener('mouseenter', Swal.stopTimer)
    toast.addEventListener('mouseleave', Swal.resumeTimer)
  }
});

window.handleFormSubmit = function(clearForm) {
  if (!entryForm.checkValidity()) {
      entryForm.reportValidity();
      return;
  }

  const enteredQuotation = quotationInput.value.trim();
  const isValidQuotation = quotationData.some(item => String(item.quotation_no) === enteredQuotation);

  if (!isValidQuotation) {
      Swal.fire({
          icon: 'error',
          title: 'Invalid Quotation',
          text: 'Please select a valid QUOTATION NO from the list!'
      });
      return;
  }

  const fd = new FormData(entryForm);
  const obj = {};
  fd.forEach((v,k)=>obj[k]=v);
  const currentJSON = JSON.stringify(obj);

  if (lastSubmittedJSON === currentJSON) {
      Swal.fire({
          icon: 'warning',
          title: 'Duplicate Entry',
          text: 'Change at least one field before submitting again.',
          confirmButtonColor: '#d33'
      });
      return;
  }
  
  btnSubmitExit.disabled = true;
  btnSubmitKeep.disabled = true;
  const originalTextExit = btnSubmitExit.innerText;
  const originalTextKeep = btnSubmitKeep.innerText;
  
  if(clearForm) btnSubmitExit.innerText = "Saving...";
  else btnSubmitKeep.innerText = "Saving...";

  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify(obj)
  })
    .then(r=>r.json())
    .then(res=>{
      if(res.result==="success"){
        Toast.fire({
          icon: 'success',
          title: 'Saved successfully'
        });
        
        lastSubmittedJSON = currentJSON;

        if (clearForm) {
            entryForm.reset();
            lastSubmittedJSON = ""; 
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById("entryDate").value = `${yyyy}-${mm}-${dd}`;
            
            if(auth.currentUser){
                document.getElementById("userEmail").value = auth.currentUser.email;
                document.getElementById("testedBy").value = auth.currentUser.displayName;
            }
        }
      }else{
        throw new Error(res.message);
      }
    })
    .catch(err=>Swal.fire("Error", "Failed: " + err, "error"))
    .finally(()=>{
        btnSubmitExit.disabled = false;
        btnSubmitKeep.disabled = false;
        btnSubmitExit.innerText = originalTextExit;
        btnSubmitKeep.innerText = originalTextKeep;
    });
};
</script>

</body>
</html>
